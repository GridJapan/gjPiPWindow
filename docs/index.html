<script>
(function(){
  var supported = ["en","jp","zh","ko","km"];
  var map = {en:"en", ja:"jp", zh:"zh", ko:"ko", km:"km"};
  var def = "jp"; // デフォルトは日本語
  var dir = def;
  try {
    var langs = (navigator.languages && navigator.languages.length) ? navigator.languages : [navigator.language||""];
    for (var i=0;i<langs.length;i++){
      var code = (langs[i]||"").toLowerCase().split("-")[0];
      if (map[code]) { dir = map[code]; break; }
    }
  } catch(e){}
  location.replace(dir + "/");
})();
</script>
